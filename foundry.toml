[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
# optimizer = true 开启编译器优化，可以减小合约体积、降低 gas 消耗
# optimizer_runs = 200 #优化器运行次数，数值越高优化越充分，编译时间也会变长
# verbosity = 3 日志详细等级，3 级会输出较详细的测试执行信息（如事件、错误信息）
# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

